<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockerByAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">StockerByAI</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/instruments">Instruments</a>
                <a class="nav-link" href="/indicators">Indicators</a>
                <a class="nav-link" href="/pipeline">Pipeline</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Instruments</h5>
                        <p class="card-text">Browse and filter stocks, ETFs and indices.</p>
                        <a href="/instruments" class="btn btn-primary">Open</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Pipeline</h5>
                        <p class="card-text">View pipeline run history and status.</p>
                        <a href="/pipeline" class="btn btn-info">Open</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
