<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Indicators — StockerByAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">StockerByAI</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/instruments">Instruments</a>
                <a class="nav-link active" href="/indicators">Indicators</a>
                <a class="nav-link" href="/pipeline">Pipeline</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Indicators</h2>

        <form method="POST" class="row g-2 mb-3">
            <div class="col-auto">
                <input type="text" name="indicator_name" class="form-control" placeholder="Indicator name (e.g. sma)" required>
            </div>
            <div class="col-auto">
                <input type="text" name="parameters" class="form-control" placeholder="Parameters (e.g. 20)">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-success">Add</button>
            </div>
        </form>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Indicator</th>
                    <th>Parameters</th>
                    <th>Total Rows</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for row in indicators %}
                <tr>
                    <td><strong>{{ row.indicator_name }}</strong></td>
                    <td>{{ row.parameters or '(default)' }}</td>
                    <td>{{ row.total }}</td>
                    <td>
                        <form method="POST" action="/indicators/delete" style="display:inline">
                            <input type="hidden" name="indicator_name" value="{{ row.indicator_name }}">
                            <input type="hidden" name="parameters" value="{{ row.parameters or '' }}">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center text-muted">No indicators found. Run the pipeline first.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
