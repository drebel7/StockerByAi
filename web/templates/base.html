<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}StockerByAI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body { background: #f5f6fa; }
        .sidebar { background: #1e2a3a; min-height: 100vh; }
        .sidebar .nav-link { color: #a0b0c0; padding: .6rem 1rem; border-radius: .3rem; margin: .1rem .5rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #2c3e50; color: #fff; }
        .sidebar .nav-link i { margin-right: .5rem; width: 1.2rem; text-align: center; }
        .stat-card { border: none; border-radius: .75rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .stat-card .icon { font-size: 2rem; opacity: .7; }
        .pipeline-running { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
        .table th { border-top: none; font-weight: 600; color: #555; }
        .pagination { margin-bottom: 0; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-auto sidebar p-0 d-none d-md-flex flex-column" style="width:220px">
            <div class="p-3 text-white fs-5 fw-bold border-bottom border-secondary">StockerByAI</div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link {{ 'active' if active_page == '/' else '' }}" href="/"><i class="bi bi-speedometer2"></i>Dashboard</a>
                <a class="nav-link {{ 'active' if active_page == '/instruments' else '' }}" href="/instruments"><i class="bi bi-building"></i>Instruments</a>
                <a class="nav-link {{ 'active' if active_page == '/indicators' else '' }}" href="/indicators"><i class="bi bi-graph-up"></i>Indicators</a>
                <a class="nav-link {{ 'active' if active_page == '/signals' else '' }}" href="/signals"><i class="bi bi-signpost-2"></i>Signals</a>
                <a class="nav-link {{ 'active' if active_page == '/statistics' else '' }}" href="/statistics"><i class="bi bi-table"></i>Statistics</a>
                <a class="nav-link {{ 'active' if active_page == '/pipeline' else '' }}" href="/pipeline"><i class="bi bi-gear"></i>Pipeline</a>
            </nav>
        </div>
        <div class="col ps-0" style="margin-left:220px">
            <nav class="navbar navbar-light bg-white shadow-sm px-3 d-md-none">
                <a class="navbar-brand" href="/">StockerByAI</a>
            </nav>
            <div class="p-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
